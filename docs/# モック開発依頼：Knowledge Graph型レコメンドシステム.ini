# モック開発依頼：Knowledge Graph型レコメンドシステム

## 目的

自動車メーカー本部長のショールーム来訪時に見せるデモモックを開発する。

単なる「車のおすすめシステム」ではなく、AI時代に増大する生活者の選択負荷・判断負荷を軽減し、納得感ある意思決定を支援する体験として見せたい。

## コンセプト

# 迷わせないレコメンド

## サブコンセプト

AIが一方的に最適解を押し付けるのではなく、ユーザーの価値観・生活文脈・不安・利用シーンを理解し、なぜその提案なのかを説明できる形で提示する。

## キーメッセージ

- SDV時代、車の機能・サービスは増え続ける
- しかし、生活者も販売店も「何を選べばよいか」がわかりにくくなる
- 生成AIだけでは推薦理由がブラックボックスになりやすい
- Knowledge Graphにより「人・価値観・生活・負荷・車両機能・商品」をつなぎ、説明可能な推薦を実現する
- これは販売店の属人的な価値提案を、メーカーの資産に変える仕組みである

---

# デモ全体の流れ

想定時間：7〜10分

1. Opening：選択負荷の課題提示
2. Quick Questions：ユーザー理解のための5問
3. AI Delegation Level：AIにどこまで任せるかを選ぶ
4. Knowledge Graph Visualization：推薦理由を可視化
5. Recommendation：3つの候補を提示
6. Dealer Support：販売店スタッフ向け提案トークに変換
7. Closing：次のAXIS体験へ接続

---

# 画面要件

## 画面1：Opening

### 目的

SDV時代の課題を提示し、「なぜこのシステムが必要か」を理解させる。

### 表示内容

タイトル：

> 選択肢が多い時代

サブコピー：

> “最適なもの”を探すほど、人は疲れていく。

本文：

> SDV時代、車の価値は増え続けています。  
> しかし、機能・サービス・オプションが増えるほど、生活者は選びにくくなり、販売店も説明しきれなくなります。

### ビジュアル

大量の情報カードが浮遊・流れるイメージ。

カード例：

- EV
- HEV
- ADAS
- OTA
- Subscription
- Safety
- Family
- Cost
- UX
- Lifestyle

### CTA

`体験を開始する`

---

## 画面2：Quick Questions

### 目的

ユーザー本人を主人公化し、価値観・生活文脈・不安を取得する。

### UI

1問ずつ表示するカードUI。  
回答はクリック式。

右側に「あなた理解MAP」を表示し、回答ごとにスコアが変化する演出を入れる。

### 質問

#### Q1. 車に求める価値は？

- 安心
- 楽しさ
- 家族時間
- 効率
- ステータス

#### Q2. 休日の過ごし方は？

- 家族中心
- 一人時間
- アクティブ
- 学び
- 趣味

#### Q3. 最も避けたい後悔は？

- 買ってから使わない
- 家族不満
- 維持費が高い
- すぐ飽きる
- 機能不足

#### Q4. 移動時のストレスは？

- 疲れる
- 渋滞
- 駐車
- 操作が難しい
- 情報が多い

#### Q5. AIとの付き合い方は？

- AIに決めてほしい
- 候補だけほしい
- 自分で選びたい

### 右側表示例

```text
あなた理解MAP

安心      █████████ 92%
家族      ████████ 84%
効率      ██████ 71%
楽しさ    ████ 48%
冒険      ███ 32%